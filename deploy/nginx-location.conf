# ============================================================
# Pixel Office — nginx location blocks
# Include inside your server {} block
# ============================================================
# IMPORTANT: Order matters. More-specific prefixes first.
# ⚠️  DO NOT add auth_basic to /api/ — XHR will get 401 → 0 agents shown
# ⚠️  DO NOT remove /_next/ block — JS chunks get 404 → white screen (Pixi.js fails)
# ============================================================

# Static Next.js assets — must be served WITH auth so browser sends credentials
location ^~ /_next/ {
    auth_basic "Pixel Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# API — NO auth (browser XHR does not send Basic Auth credentials)
location ^~ /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
}

# Office UI — password-protected (keep /office/... path — matches Next.js app routes)
location ^~ /office/ {
    auth_basic "Pixel Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_buffering off;
}
