# ─────────────────────────────────────────────────────────────
# Pixel Office Dashboard — nginx location blocks
# Add these inside your existing server { } block
# ─────────────────────────────────────────────────────────────

# ⚠️ CRITICAL: Next.js static assets MUST proxy to port 3001
# Without this, JS chunks return 404 → Pixi.js never loads → blank canvas
location ^~ /_next/ {
    auth_basic "Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# API routes — NO auth_basic here!
# Browser XHR (fetch) does not send Basic Auth headers → 401 → 0 agents shown
location ^~ /api/ {
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

# Redirect /office → /office/stream
location = /office {
    auth_basic "Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    return 302 /office/stream;
}

location = /office/ {
    auth_basic "Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    return 302 /office/stream;
}

# Dashboard pages
location ^~ /office/ {
    auth_basic "Office";
    auth_basic_user_file /etc/nginx/.htpasswd;
    rewrite ^/office/(.*)$ /$1 break;
    proxy_pass http://127.0.0.1:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    # SSE support for live feed
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
}
